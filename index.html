<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Suivi Santé</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            /* Variables Thème Clair (Par défaut) */
            --bg-color: #F2F2F7; 
            --card-bg: #FFFFFF; 
            --card-bg-light: #E5E5EA;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --accent-blue: #0A84FF; 
            --red-delete: #FF3B30; 
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.06);
            --shadow-subtle: 0 2px 8px rgba(0, 0, 0, 0.04); 
            --modal-bg: #F2F2F7;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body.dark-theme {
            /* Variables Thème Sombre */
            --bg-color: #000000;
            --card-bg: #1C1C1E; 
            --card-bg-light: #2C2C2E;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --shadow-subtle: 0 2px 8px rgba(0, 0, 0, 0.2);
            --modal-bg: #151517;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-family);
            margin: 0; padding: 0; display: flex; justify-content: center;
            -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%; max-width: 430px; padding: 20px; padding-bottom: env(safe-area-inset-bottom, 40px);
            box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column;
        }

        /* Toast "Enregistré" */
        .toast {
            position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.8); color: #fff; padding: 12px 24px; border-radius: 30px;
            font-size: 15px; font-weight: 600; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        body.dark-theme .toast { background: rgba(255, 255, 255, 0.9); color: #000; }

        /* Interface Globale */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; margin-top: env(safe-area-inset-top, 10px); }
        .header h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: 0.5px; }
        .icon { font-size: 22px; cursor: pointer; color: var(--text-muted); font-weight: 300; transition: color 0.3s; }

        .status-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .status-title { color: var(--text-muted); font-size: 15px; font-weight: 500; }
        .status-value { font-size: 15px; font-weight: 600; color: var(--text-main); transition: color 0.3s; }

        .card { background-color: var(--card-bg); border-radius: 20px; padding: 22px; margin-bottom: 25px; box-shadow: 0 4px 20px var(--shadow-color); transition: background-color 0.3s ease, box-shadow 0.3s ease; }
        .input-label { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 15px; display: block; }
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; transition: border-color 0.3s; }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; background: transparent; border: none; color: var(--text-main); font-size: 36px; font-weight: 600; width: 50%; outline: none; padding: 0; transition: color 0.3s; }
        input[type="number"]::placeholder { color: var(--text-muted); opacity: 0.5; }
        
        .dropdown { background-color: var(--card-bg-light); color: var(--text-main); border: none; padding: 10px 14px; border-radius: 12px; font-size: 15px; font-weight: 500; outline: none; -webkit-appearance: none; appearance: none; text-align: center; transition: background-color 0.3s, color 0.3s; }
        .btn-primary { background-color: var(--accent-blue); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; transition: transform 0.1s ease, background-color 0.2s; }
        .btn-primary:active { transform: scale(0.97); background-color: #0070E0; }

        /* Tendance */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .section-desc { color: var(--text-muted); font-size: 13px; margin-bottom: 18px; line-height: 1.4; }
        .trend-labels { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 12px; font-weight: 500; margin-top: 15px;}
        
        /* Calendrier Bento */
        .calendar-nav { display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: normal; }
        .calendar-nav span { cursor: pointer; color: var(--accent-blue); padding: 5px; }
        #calendar-month-label { color: var(--text-main); font-weight: 600; font-size: 16px; min-width: 110px; text-align: center; transition: color 0.3s; }
        #calendar-container { margin-top: 15px; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 8px; }
        .calendar-weekday { background-color: var(--card-bg); border-radius: 10px; padding: 10px 0; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); box-shadow: var(--shadow-subtle); transition: background-color 0.3s, color 0.3s; }
        .calendar-weekday.today-header { background-color: var(--card-bg-light); color: var(--text-main); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-cell { background-color: var(--card-bg); border-radius: 12px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: var(--text-main); box-shadow: var(--shadow-subtle); cursor: pointer; position: relative; transition: background-color 0.3s, color 0.3s, transform 0.1s; }
        .calendar-cell:active { transform: scale(0.92); }
        .calendar-cell.empty { background-color: transparent; box-shadow: none; cursor: default; }
        .calendar-cell.empty:active { transform: none; }
        .calendar-cell.today { background-color: var(--card-bg-light); font-weight: 700; }
        .data-dot { position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; background-color: var(--accent-blue); border-radius: 50%; }

        /* Modale */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.show { opacity: 1; display: flex; }
        .modal-content { background-color: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 24px; width: 100%; max-width: 360px; padding: 24px; max-height: 80vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s, border-color 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 19px; font-weight: 600; }
        .close-btn { background: var(--card-bg-light); color: var(--text-muted); width: 30px; height: 30px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { background-color: var(--card-bg-light); border: 1px solid var(--border-color); border-radius: 16px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.3s, border-color 0.3s; }
        .history-item-content { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; }
        .history-main { font-size: 17px; font-weight: 600; }
        .history-sub { color: var(--text-muted); font-size: 13px; margin-top: 6px; font-weight: 500; }
        .history-badge { background-color: var(--bg-color); padding: 8px 12px; border-radius: 10px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: background-color 0.3s; }
        .insulin-type-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }
        
        .delete-btn { background: rgba(255, 59, 48, 0.1); color: var(--red-delete); border: none; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 12px; transition: background 0.2s; padding: 0; }
        .delete-btn:active { background: rgba(255, 59, 48, 0.2); }
    </style>
</head>
<body>

<div id="toast" class="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    Enregistré
</div>

<div class="app-container">
    <div class="header">
        <span class="icon"></span> 
        <h1>Suivi Diabète</h1>
        <span class="icon" id="theme-btn" onclick="toggleTheme()" style="font-size: 24px;">☾</span>
    </div>

    <div class="status-header">
        <span class="status-title">Aujourd'hui</span>
        <span class="status-value" id="today-count">Synchronisation...</span>
    </div>

    <div class="card">
        <span class="input-label">Nouveau relevé</span>
        <div class="input-row">
            <input type="number" id="sugar-input" placeholder="105" step="0.1">
            <select class="dropdown" id="period-input">
                <option value="Matin">Matin</option>
                <option value="Midi">Midi</option>
                <option value="Soir">Soir</option>
            </select>
        </div>
        <div class="input-row" style="border-bottom: none; margin-bottom: 5px;">
            <input type="number" id="insulin-input" placeholder="4" step="1">
            <select class="dropdown" id="insulin-type-input">
                <option value="Lente" selected>Lente</option>
                <option value="Rapide">Rapide</option>
            </select>
        </div>
        <button class="btn-primary" onclick="saveEntry()">Enregistrer</button>
    </div>

    <div class="card" style="padding-bottom: 18px;">
        <div class="section-title">Tendance Glycémie</div>
        <div class="section-desc" style="margin-bottom: 25px;">Moyenne sur les 5 derniers jours</div>
        <div id="trend-chart" style="height: 100px; width: 100%;"></div>
        <div class="trend-labels">
            <span>J-4</span><span>J-3</span><span>J-2</span><span>J-1</span>
            <span style="color: var(--text-main); font-weight: 600;">Auj.</span>
        </div>
    </div>

    <div style="margin-bottom: 25px;">
        <div class="section-title" style="margin-bottom: 15px;">
            <span>Historique</span>
            <div class="calendar-nav">
                <span onclick="changeMonth(-1)">‹</span>
                <span id="calendar-month-label">Mois</span>
                <span onclick="changeMonth(1)">›</span>
            </div>
        </div>
        <div id="calendar-container"></div>
    </div>
</div>

<div id="day-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modal-date-title">Date</h3>
            <div class="close-btn" onclick="closeModal()">×</div>
        </div>
        <div id="modal-entries" class="history-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3ZfHrodj7zIbp8DqnlsIR80PVsD2_kJc",
      authDomain: "app-insuline.firebaseapp.com",
      projectId: "app-insuline",
      storageBucket: "app-insuline.firebasestorage.app",
      messagingSenderId: "565335881993",
      appId: "1:565335881993:web:480f3b795a332fdb3a7bd8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.entries = [];
    window.calendarDate = new Date();

    const q = query(collection(db, "releves"), orderBy("date", "desc"));
    onSnapshot(q, (snapshot) => {
        window.entries = [];
        snapshot.forEach((firebaseDoc) => {
            window.entries.push({ id: firebaseDoc.id, ...firebaseDoc.data() });
        });
        updateUI();
    });

    window.saveEntry = async function() {
        const sugar = document.getElementById('sugar-input').value;
        const insulin = document.getElementById('insulin-input').value;
        const period = document.getElementById('period-input').value;
        const insulinType = document.getElementById('insulin-type-input').value;

        if (!sugar) return alert("Veuillez saisir au moins le taux de sucre.");

        const newEntry = {
            date: new Date().toISOString(),
            sugar: parseFloat(sugar),
            insulin: insulin ? parseFloat(insulin) : 0,
            insulinType: insulin ? insulinType : null,
            period: period
        };

        await addDoc(collection(db, "releves"), newEntry);
        
        document.getElementById('sugar-input').value = '';
        document.getElementById('insulin-input').value = '';
        document.getElementById('insulin-type-input').value = 'Lente';
        window.setAutoPeriod();

        if (navigator.vibrate) navigator.vibrate(40);
        window.showToast();
    };

    window.deleteEntry = async function(id) {
        if(confirm("Voulez-vous vraiment supprimer ce relevé ?")) {
            await deleteDoc(doc(db, "releves", id));
            window.closeModal(); 
            if (navigator.vibrate) navigator.vibrate(40);
        }
    };
</script>

<script>
    window.initTheme = function() {
        const savedTheme = localStorage.getItem('diabeteTheme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            document.getElementById('theme-btn').innerText = '☀';
        } else {
            document.getElementById('theme-btn').innerText = '☾';
        }
    }

    window.toggleTheme = function() {
        const body = document.body;
        body.classList.toggle('dark-theme');
        const isDark = body.classList.contains('dark-theme');
        document.getElementById('theme-btn').innerText = isDark ? '☀' : '☾';
        localStorage.setItem('diabeteTheme', isDark ? 'dark' : 'light');
        if(window.updateTrendChart) window.updateTrendChart();
    }

    window.setAutoPeriod = function() {
        const hour = new Date().getHours();
        const periodSelect = document.getElementById('period-input');
        if (hour >= 5 && hour < 12) periodSelect.value = "Matin";
        else if (hour >= 12 && hour < 18) periodSelect.value = "Midi";
        else periodSelect.value = "Soir";
    }

    window.showToast = function() {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    window.updateUI = function() {
        let todayCount = 0;
        const todayStr = new Date().toDateString();
        window.entries.forEach(entry => {
            if (new Date(entry.date).toDateString() === todayStr) todayCount++;
        });
        document.getElementById('today-count').innerText = `${todayCount} relevé${todayCount > 1 ? 's' : ''}`;
        window.updateTrendChart();
        window.renderCalendar(); 
    }

    window.updateTrendChart = function() {
        if(!window.entries) return;
        const days = 5; let averages = [];
        const today = new Date(); today.setHours(0,0,0,0);

        for(let i = days - 1; i >= 0; i--) {
            let targetDate = new Date(today.getTime() - i * 86400000);
            let dayEntries = window.entries.filter(e => new Date(e.date).toDateString() === targetDate.toDateString());
            let avg = 0;
            if(dayEntries.length > 0) {
                let sum = dayEntries.reduce((acc, curr) => acc + curr.sugar, 0);
                avg = sum / dayEntries.length;
            }
            averages.push(avg);
        }

        const container = document.getElementById('trend-chart');
        let validAvgs = averages.filter(a => a > 0);
        if(validAvgs.length === 0) {
            container.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:14px;">Aucune donnée</div>';
            return;
        }

        let min = Math.min(...validAvgs) * 0.8; let max = Math.max(...validAvgs) * 1.15; 
        if (min === max) { min -= 20; max += 20; }
        const svgW = 300; const svgH = 80; const stepX = svgW / 4; 
        let pathD = ""; let elementsSVG = "";
        const textColor = document.body.classList.contains('dark-theme') ? '#FFFFFF' : '#000000';

        for(let i=0; i<5; i++) {
            if(averages[i] > 0) {
                let x = i * stepX; let y = svgH - ((averages[i] - min) / (max - min)) * svgH;
                if(pathD === "") pathD = `M ${x},${y} `; else pathD += `L ${x},${y} `;
                elementsSVG += `<circle cx="${x}" cy="${y}" r="5" fill="var(--card-bg)" stroke="var(--accent-blue)" stroke-width="2.5"/>`;
                let displayValue = Math.round(averages[i] * 10) / 10;
                elementsSVG += `<text x="${x}" y="${y - 14}" fill="${textColor}" font-size="12" font-family="sans-serif" font-weight="700" text-anchor="middle">${displayValue}</text>`;
            }
        }
        container.innerHTML = `<svg viewBox="-15 -25 ${svgW + 30} ${svgH + 40}" width="100%" height="100%" style="overflow: visible;"><path d="${pathD}" fill="none" stroke="var(--accent-blue)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>${elementsSVG}</svg>`;
    }

    window.renderCalendar = function() {
        if(!window.entries) return;
        const year = window.calendarDate.getFullYear(); const month = window.calendarDate.getMonth();
        const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        document.getElementById('calendar-month-label').innerText = `${monthNames[month]} ${year}`;
        
        let firstDayIndex = new Date(year, month, 1).getDay(); let startOffset = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate(); const todayStr = new Date().toDateString();
        
        const weekdaysList = ["LUN", "MAR", "MER", "JEU", "VEN", "SAM", "DIM"];
        let html = '<div class="calendar-weekdays">';
        weekdaysList.forEach((dayLabel, index) => {
            let isTodayWeekday = false;
            if (year === new Date().getFullYear() && month === new Date().getMonth()) {
                const currentDayIndex = new Date().getDay(); const adjustedIndex = currentDayIndex === 0 ? 6 : currentDayIndex - 1;
                if (index === adjustedIndex) isTodayWeekday = true;
            }
            html += `<div class="calendar-weekday ${isTodayWeekday ? 'today-header' : ''}">${dayLabel}</div>`;
        });
        html += '</div><div class="calendar-grid">';
        
        for(let i=0; i<startOffset; i++) { html += `<div class="calendar-cell empty"></div>`; }
        
        for(let day=1; day<=daysInMonth; day++) {
            const cellDate = new Date(year, month, day);
            const isToday = cellDate.toDateString() === todayStr;
            const hasData = window.entries.some(e => new Date(e.date).toDateString() === cellDate.toDateString());
            let todayClass = isToday ? 'today' : ''; let dotHtml = hasData ? '<div class="data-dot"></div>' : '';
            
            html += `<div class="calendar-cell ${todayClass}" onclick="openDayModal(${year}, ${month}, ${day})">${day}${dotHtml}</div>`;
        }
        html += '</div>';
        document.getElementById('calendar-container').innerHTML = html;
    }

    window.changeMonth = function(delta) {
        window.calendarDate.setMonth(window.calendarDate.getMonth() + delta);
        window.renderCalendar();
    }

    window.openDayModal = function(year, month, day) {
        const selectedDate = new Date(year, month, day); const dateStr = selectedDate.toDateString();
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        let titleStr = selectedDate.toLocaleDateString('fr-FR', options);
        document.getElementById('modal-date-title').innerText = titleStr.charAt(0).toUpperCase() + titleStr.slice(1);
        
        const dayEntries = window.entries.filter(e => new Date(e.date).toDateString() === dateStr);
        const container = document.getElementById('modal-entries'); container.innerHTML = '';
        
        if (dayEntries.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:20px;">Aucun relevé ce jour.</div>';
        } else {
            dayEntries.forEach(entry => {
                const timeStr = new Date(entry.date).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                let insulinDisplay = '-';
                if (entry.insulin > 0) insulinDisplay = `${entry.insulin} U <span class="insulin-type-label">${entry.insulinType}</span>`;
                const trashIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

                container.innerHTML += `
                    <div class="history-item">
                        <div class="history-item-content">
                            <div><div class="history-main">${entry.sugar} mg/dL</div><div class="history-sub">${timeStr} (${entry.period})</div></div>
                            <div class="history-badge">${insulinDisplay}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteEntry('${entry.id}')">${trashIcon}</button>
                    </div>`;
            });
        }
        document.getElementById('day-modal').classList.add('show');
    }

    window.closeModal = function(event) {
        if (event && event.target !== document.getElementById('day-modal')) return;
        document.getElementById('day-modal').classList.remove('show');
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    window.initTheme(); window.setAutoPeriod();
</script>
</body>
</html>
